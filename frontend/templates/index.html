<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Compiler Pipeline</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <!-- D3.js -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <!-- Highlight.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>

<div class="app-layout">
    <!-- Top Pipeline -->
    <header class="top-bar panel">
        <div class="logo">
            <div class="logo-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 17l6-6-6-6 M12 19h8"/></svg></div>
            <div class="logo-text">Mini Compiler</div>
        </div>
        <div class="pipeline-steps" id="pipeline-steps">
            <div class="step" data-step="0"><span class="step-num">0</span><span class="step-name">Source</span></div>
            <div class="step-divider"></div>
            <div class="step" data-step="1"><span class="step-num">1</span><span class="step-name">Lexer</span></div>
            <div class="step-divider"></div>
            <div class="step" data-step="2"><span class="step-num">2</span><span class="step-name">Parser</span></div>
            <div class="step-divider"></div>
            <div class="step" data-step="3"><span class="step-num">3</span><span class="step-name">Analytics</span></div>
            <div class="step-divider"></div>
            <div class="step" data-step="4"><span class="step-num">4</span><span class="step-name">IR</span></div>
            <div class="step-divider"></div>
            <div class="step" data-step="5"><span class="step-num">5</span><span class="step-name">HTML</span></div>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="workspace">
        <!-- Left Panel: Input -->
        <section class="panel editor-panel">
            <div class="panel-header">
                <h2>Input.md</h2>
                <div class="actions">
                    <button id="btn-compile" class="btn btn-primary">Compile</button>
                </div>
            </div>
            <div class="editor-container">
                <textarea id="markdown-input" class="editor-textarea" spellcheck="false" placeholder="Write markdown here...">{{ sample_markdown }}</textarea>
            </div>
        </section>

        <!-- Right Panel: Output -->
        <section class="panel results-panel">
            <div class="tabs-header" id="tabs-container">
                <button class="tab-btn active" data-target="pane-lexer">Tokens</button>
                <button class="tab-btn" data-target="pane-ast">AST</button>
                <button class="tab-btn" data-target="pane-cst">Parse Tree</button>
                <button class="tab-btn" data-target="pane-analytics">Analytics</button>
                <button class="tab-btn" data-target="pane-ir">IR JSON</button>
                <button class="tab-btn" data-target="pane-html">Gen HTML</button>
                <button class="tab-btn tab-preview-btn" data-target="pane-preview">Preview</button>
            </div>

            <div class="tabs-content">
                
                <!-- Tokens Tab -->
                <div class="tab-pane active" id="pane-lexer">
                    <div class="scroll-wrap padding-wrap" id="tokens-container">
                        <div class="empty-state">Click Compile to view tokens</div>
                    </div>
                </div>

                <!-- AST Tab -->
                <div class="tab-pane" id="pane-ast">
                    <div class="viz-toolbar">
                        <button class="btn btn-sm" onclick="vizExpandAll('ast-svg')">Expand All</button>
                        <button class="btn btn-sm" onclick="vizCollapseAll('ast-svg')">Collapse All</button>
                        <button class="btn btn-sm" onclick="vizReset('ast-svg')">Reset View</button>
                        <div class="speed-control">
                            <span>Anim Speed:</span>
                            <input type="range" id="anim-speed" min="100" max="1500" value="400">
                        </div>
                    </div>
                    <div class="tree-container" id="ast-svg"></div>
                </div>

                <!-- CST Tab -->
                <div class="tab-pane" id="pane-cst">
                    <div class="viz-toolbar">
                        <button class="btn btn-sm" onclick="vizExpandAll('cst-svg')">Expand All</button>
                        <button class="btn btn-sm" onclick="vizCollapseAll('cst-svg')">Collapse All</button>
                        <button class="btn btn-sm" onclick="vizReset('cst-svg')">Reset View</button>
                    </div>
                    <div class="tree-container" id="cst-svg"></div>
                </div>
                
                <!-- Analytics Tab -->
                <div class="tab-pane" id="pane-analytics">
                    <div class="scroll-wrap padding-wrap" id="analytics-container">
                        <div class="empty-state">Click Compile to view analytics</div>
                    </div>
                </div>

                <!-- IR Tab -->
                <div class="tab-pane" id="pane-ir">
                    <div class="scroll-wrap padding-wrap">
                        <div id="ir-output" class="json-tree"></div>
                    </div>
                </div>

                <!-- HTML Gen Tab -->
                <div class="tab-pane" id="pane-html">
                    <div class="scroll-wrap padding-wrap">
                        <pre><code class="language-html" id="html-output"></code></pre>
                    </div>
                </div>

                <!-- Preview Tab -->
                <div class="tab-pane" id="pane-preview">
                    <iframe class="preview-frame" id="preview-frame" sandbox="allow-same-origin allow-scripts allow-popups"></iframe>
                </div>

            </div>
        </section>
    </main>
</div>

<script>
    // --- UI Logic ---
    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabPanes = document.querySelectorAll('.tab-pane');
    
    tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            tabBtns.forEach(b => b.classList.remove('active'));
            tabPanes.forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(btn.dataset.target).classList.add('active');
        });
    });

    let currentPhases = null;

    // --- Pipeline Animation ---
    const delay = ms => new Promise(res => setTimeout(res, ms));

    async function animatePipeline(phases) {
        const steps = document.querySelectorAll('.step');
        steps.forEach(s => s.className = 'step');
        
        for(let i=0; i<steps.length; i++) {
            steps[i].classList.add('active');
            await delay(300);
            steps[i].classList.remove('active');
            steps[i].classList.add('done');
            
            if(i === 1) renderLexer(phases.lexer.tokens);
            if(i === 2) {
                renderTree('#ast-svg', phases.parser.vis_tree);
                renderTree('#cst-svg', phases.parser.cst_tree, true);
            }
            if(i === 3) renderAnalytics(phases.analytics);
            if(i === 4) renderJSONTree(phases.ir, document.getElementById('ir-output'));
            if(i === 5) {
                const codeBlock = document.getElementById('html-output');
                codeBlock.textContent = phases.codegen.html;
                delete codeBlock.dataset.highlighted;
                hljs.highlightElement(codeBlock);
                renderPreview(phases.codegen.html);
            }
        }
    }

    // --- JSON Renderer ---
    function renderJSONTree(obj, container) {
        container.innerHTML = '';
        function createNode(key, val, isLast) {
            const wrapper = document.createElement('div');
            wrapper.className = 'json-node';
            
            const keyHtml = key !== null ? `<span class="json-key">"${key}"</span>: ` : '';
            const comma = isLast ? '' : ',';

            if (val === null) {
                wrapper.innerHTML = `${keyHtml}<span class="json-null">null</span>${comma}`;
            } else if (typeof val === 'string') {
                wrapper.innerHTML = `${keyHtml}<span class="json-string">"${val.replace(/"/g, '\\"')}"</span>${comma}`;
            } else if (typeof val === 'number' || typeof val === 'boolean') {
                wrapper.innerHTML = `${keyHtml}<span class="json-number">${val}</span>${comma}`;
            } else if (typeof val === 'object') {
                const isArray = Array.isArray(val);
                const openBracket = isArray ? '[' : '{';
                const closeBracket = isArray ? ']' : '}';
                const keys = Object.keys(val);
                
                if (keys.length === 0) {
                    wrapper.innerHTML = `${keyHtml}${openBracket}${closeBracket}${comma}`;
                } else {
                    const details = document.createElement('details');
                    details.open = true;
                    const summary = document.createElement('summary');
                    summary.innerHTML = `${keyHtml}<span class="json-bracket">${openBracket}</span>`;
                    details.appendChild(summary);
                    
                    const childrenDiv = document.createElement('div');
                    childrenDiv.className = 'json-children';
                    keys.forEach((k, idx) => {
                        childrenDiv.appendChild(createNode(isArray ? null : k, val[k], idx === keys.length - 1));
                    });
                    details.appendChild(childrenDiv);
                    
                    const closeDiv = document.createElement('div');
                    closeDiv.innerHTML = `<span class="json-bracket">${closeBracket}</span>${comma}`;
                    details.appendChild(closeDiv);
                    wrapper.appendChild(details);
                }
            }
            return wrapper;
        }
        container.appendChild(createNode(null, obj, true));
    }

    // --- Data Rendering ---
    function renderLexer(tokens) {
        const container = document.getElementById('tokens-container');
        container.innerHTML = '';
        
        const inlineTypes = ['text', 'strong', 'emph', 'inline_code', 'link', 'image', 'soft_break', 'hard_break', 'inline_math', 'html_inline'];
        let currentBlock = null;
        
        tokens.forEach(t => {
            const isInline = inlineTypes.includes(t.type.toLowerCase());
            if (!isInline || !currentBlock) {
                currentBlock = document.createElement('details');
                currentBlock.className = 'token-block';
                const summary = document.createElement('summary');
                summary.className = 'token-block-head';
                summary.innerHTML = `<span class="badge">${t.type}</span> <span class="t-val">${t.value.substring(0,30)}</span>`;
                currentBlock.appendChild(summary);
                
                const inlineContainer = document.createElement('div');
                inlineContainer.className = 'token-inlines';
                currentBlock.appendChild(inlineContainer);
                currentBlock.inlines = inlineContainer;
                
                container.appendChild(currentBlock);
            } else {
                const inlineEl = document.createElement('div');
                inlineEl.className = 'token-inline-item';
                inlineEl.innerHTML = `<span class="badge">${t.type}</span> <span class="t-val">${t.value}</span>`;
                currentBlock.inlines.appendChild(inlineEl);
            }
        });
    }

    function renderAnalytics(stats) {
        const container = document.getElementById('analytics-container');
        let html = '<div class="analytics-grid">';
        
        html += `<div class="stat-card"><h3>Tree Metrics</h3>
            <div class="metrics-row">
                <div class="metric"><span>Max Depth</span><strong>${stats.max_depth}</strong></div>
                <div class="metric"><span>Avg Depth</span><strong>${stats.avg_depth}</strong></div>
                <div class="metric"><span>Block Nodes</span><strong>${stats.block_nodes}</strong></div>
                <div class="metric"><span>Inline Nodes</span><strong>${stats.inline_nodes}</strong></div>
            </div>
        </div>`;

        html += '<div class="stat-card"><h3>Token Distribution</h3>';
        html += `<div class="stat-subtitle">Total: ${stats.total_tokens}</div><div class="bars">`;
        stats.tokens_breakdown.forEach(t => {
            let pct = (t.value / stats.total_tokens) * 100;
            html += `<div class="bar-row"><div class="bar-lbl">${t.name}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div><div class="bar-val">${t.value}</div></div>`;
        });
        html += '</div></div>';

        html += '<div class="stat-card"><h3>Node Distribution</h3>';
        html += `<div class="stat-subtitle">Total: ${stats.total_nodes}</div><div class="bars">`;
        stats.nodes_breakdown.forEach(n => {
            let pct = (n.value / stats.total_nodes) * 100;
            html += `<div class="bar-row"><div class="bar-lbl">${n.name}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div><div class="bar-val">${n.value}</div></div>`;
        });
        html += '</div></div></div>';
        
        container.innerHTML = html;
    }

    function renderPreview(htmlContent) {
        const frame = document.getElementById('preview-frame');
        // Properly load mermaid as a module so it works reliably in srcdoc
        const docHtml = `<!DOCTYPE html><html><head><base href="/">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
        <link rel="stylesheet" href="/static/render.css">
        </head><body>${htmlContent}
        <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"><\/script>
        <script>document.querySelectorAll("pre code").forEach(function(b){hljs.highlightElement(b);});<\/script>
        <script type="module">
          import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
          mermaid.initialize({startOnLoad: true, securityLevel: "loose"});
        <\/script>
        <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js" onload="document.querySelectorAll('.math').forEach(function(el){try{katex.render(el.textContent,el,{displayMode:el.classList.contains('math-display'),throwOnError:false});}catch(e){}});"><\/script>
        </body></html>`;
        frame.srcdoc = docHtml;
    }

    // --- D3.js Tree Rendering ---
    const treeState = {};
    
    function getAnimSpeed() {
        const val = document.getElementById('anim-speed');
        return val ? parseInt(val.value) : 500;
    }

    function renderTree(selector, data, isVertical=false) {
        const container = document.querySelector(selector);
        container.innerHTML = '';
        const width = container.clientWidth || 800;
        const dx = isVertical ? 40 : 30;
        const dy = isVertical ? width / 5 : 140;

        const root = d3.hierarchy(data);
        const svg = d3.select(selector).append("svg")
            .attr("width", "100%")
            .attr("height", "100%")
            .style("user-select", "none");
            
        const g = svg.append("g");
        const zoom = d3.zoom().on("zoom", (e) => g.attr("transform", e.transform));
        svg.call(zoom);

        const tree = d3.tree().nodeSize(isVertical ? [dx, dy] : [dx, dy]);
        if(isVertical) tree.separation((a, b) => a.parent == b.parent ? 1 : 1.2);

        treeState[selector] = { root, tree, g, isVertical, zoom, svg };
        
        root.x0 = isVertical ? width/2 : dy / 2;
        root.y0 = 0;
        
        if (root.children) root.children.forEach(collapse);
        updateTree(selector, root);
        vizReset(selector);
    }

    function collapse(d) {
        if(d.children) {
            d._children = d.children;
            d._children.forEach(collapse);
            d.children = null;
        }
    }
    
    function expand(d) {
        if(d._children) {
            d.children = d._children;
            d.children.forEach(expand);
            d._children = null;
        } else if (d.children) {
            d.children.forEach(expand);
        }
    }

    window.vizExpandAll = function(id) {
        const s = treeState['#'+id];
        if(!s) return;
        expand(s.root);
        updateTree('#'+id, s.root);
    };

    window.vizCollapseAll = function(id) {
        const s = treeState['#'+id];
        if(!s) return;
        if(s.root.children) s.root.children.forEach(collapse);
        updateTree('#'+id, s.root);
        vizReset(id);
    };

    window.vizReset = function(id) {
        const s = treeState[id.startsWith('#') ? id : '#'+id];
        if(!s) return;
        const transform = d3.zoomIdentity.translate(s.isVertical ? s.svg.node().clientWidth/2 : 60, 40).scale(1);
        s.svg.transition().duration(getAnimSpeed()).call(s.zoom.transform, transform);
    };

    function updateTree(selector, source) {
        const s = treeState[selector];
        const { root, tree, g, isVertical } = s;
        
        tree(root);
        const nodes = root.descendants();
        const links = root.links();
        
        const duration = getAnimSpeed();
        const transition = s.svg.transition().duration(duration);

        const node = g.selectAll("g.node").data(nodes, d => d.id || (d.id = ++window._d3IdCounter || 1));

        const nodeEnter = node.enter().append("g")
            .attr("class", "node")
            .attr("transform", d => `translate(${isVertical ? source.x0 : source.y0},${isVertical ? source.y0 : source.x0})`)
            .on("click", (event, d) => {
                if (d.children) { d._children = d.children; d.children = null; } 
                else { d.children = d._children; d._children = null; }
                updateTree(selector, d);
            });

        nodeEnter.append("circle")
            .attr("r", 1e-6)
            .style("fill", d => d._children ? "#6366f1" : (d.data.color || "#3b82f6"))
            .style("stroke", "#0d1117")
            .style("stroke-width", "1.5px")
            .style("cursor", d => (d.children || d._children) ? "pointer" : "default");

        nodeEnter.append("text")
            .attr("dy", isVertical ? "1.5em" : ".35em")
            .attr("x", d => isVertical ? 0 : (d.children || d._children ? -10 : 10))
            .attr("text-anchor", d => isVertical ? "middle" : (d.children || d._children ? "end" : "start"))
            .text(d => d.data.name)
            .style("fill", "#c9d1d9")
            .style("font-size", "11px")
            .style("font-family", "JetBrains Mono")
            .style("fill-opacity", 1e-6);

        const nodeUpdate = nodeEnter.merge(node);

        nodeUpdate.transition(transition)
            .attr("transform", d => `translate(${isVertical ? d.x : d.y},${isVertical ? d.y : d.x})`);

        nodeUpdate.select("circle").transition(transition).attr("r", 4.5);
        nodeUpdate.select("text").transition(transition).style("fill-opacity", 1);

        const nodeExit = node.exit().transition(transition)
            .attr("transform", d => `translate(${isVertical ? source.x : source.y},${isVertical ? source.y : source.x})`)
            .remove();

        nodeExit.select("circle").attr("r", 1e-6);
        nodeExit.select("text").style("fill-opacity", 1e-6);

        const link = g.selectAll("path.link").data(links, d => d.target.id);

        const linkEnter = link.enter().insert("path", "g")
            .attr("class", "link")
            .attr("d", d => {
                const o = {x: source.x0, y: source.y0};
                return diagonal(o, o, isVertical);
            })
            .style("fill", "none")
            .style("stroke", "#30363d")
            .style("stroke-width", "1.5px");

        const linkUpdate = linkEnter.merge(link);

        linkUpdate.transition(transition).attr("d", d => diagonal(d.source, d.target, isVertical));

        link.exit().transition(transition)
            .attr("d", d => {
                const o = {x: source.x, y: source.y};
                return diagonal(o, o, isVertical);
            })
            .remove();

        nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
    }

    function diagonal(s, d, isVertical) {
        if(isVertical) {
            return `M ${s.x} ${s.y} C ${s.x} ${(s.y + d.y) / 2}, ${d.x} ${(s.y + d.y) / 2}, ${d.x} ${d.y}`;
        }
        return `M ${s.y} ${s.x} C ${(s.y + d.y) / 2} ${s.x}, ${(s.y + d.y) / 2} ${d.x}, ${d.y} ${d.x}`;
    }

    // --- API Interactions ---
    document.getElementById('btn-compile').addEventListener('click', async () => {
        const md = document.getElementById('markdown-input').value;
        const btn = document.getElementById('btn-compile');
        btn.textContent = 'Compiling...';
        btn.disabled = true;

        try {
            const res = await fetch('/compile', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({markdown: md})
            });
            const data = await res.json();
            if(data.success) {
                currentPhases = data.phases;
                await animatePipeline(data.phases);
            } else {
                alert('Error: ' + data.error);
            }
        } catch(e) {
            alert('Connection error');
        } finally {
            btn.textContent = 'Compile';
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
