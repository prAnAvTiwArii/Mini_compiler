<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>__TITLE__</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <link rel="stylesheet" href="/static/render.css">
</head>

<body>
  __BODY_HTML__

  <!-- Mermaid diagrams -->
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: false });
    mermaid.run();
    if (typeof mermaid.init === 'function') {
      mermaid.init(undefined, document.querySelectorAll('.mermaid'));
    }
  </script>

  <!-- KaTeX math rendering -->
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js" onload="
      document.querySelectorAll('.math').forEach(function(el) {
        var isDisplay = el.classList.contains('math-display');
        try {
          katex.render(el.textContent, el, {
            displayMode: isDisplay,
            throwOnError: false
          });
        } catch(e) { console.error('KaTeX:', e); }
      });
    ">
    </script>

</body>

</html>
